name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Build categorized release notes once, from Conventional Commits between the
  # previous tag and this one. The publish jobs consume it as the release body.
  changelog:
    runs-on: ubuntu-22.04
    outputs:
      body: ${{ steps.gen.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: gen
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..${TAG}"; else RANGE="${TAG}"; fi

          # User-facing sections in display order. Anything else (chore, ci,
          # build, test, style) is intentionally omitted.
          order=(
            "breaking:### ⚠️ Breaking Changes"
            "security:### 🔒 Security"
            "feat:### ✨ Features"
            "fix:### 🐛 Bug Fixes"
            "perf:### ⚡ Performance"
            "refactor:### ♻️ Refactor"
            "docs:### 📝 Documentation"
          )
          declare -A SECTIONS

          while IFS=$'\t' read -r subject hash; do
            [ -n "$subject" ] || continue
            type="${subject%%:*}"            # e.g. "fix(security)" or "feat!"
            desc="${subject#*: }"
            breaking=0
            [[ "$type" == *"!" ]] && breaking=1
            type="${type%!}"
            scope=""
            base="$type"
            if [[ "$type" == *"("* ]]; then
              base="${type%%(*}"
              scope="${type##*(}"; scope="${scope%)}"
            fi
            key=""
            case "$base" in
              feat) key="feat";;
              fix) key="fix";;
              perf) key="perf";;
              refactor) key="refactor";;
              docs) key="docs";;
            esac
            [ "$scope" = "security" ] && key="security"
            [ "$breaking" -eq 1 ] && key="breaking"
            [ -n "$key" ] || continue        # drop chore/ci/build/test/style
            SECTIONS[$key]+="- ${desc} (${hash})"$'\n'
          done < <(git log --no-merges --pretty=tformat:'%s%x09%h' "${RANGE}")

          {
            for entry in "${order[@]}"; do
              k="${entry%%:*}"; title="${entry#*:}"
              if [ -n "${SECTIONS[$k]:-}" ]; then
                printf '%s\n\n%s\n' "$title" "${SECTIONS[$k]}"
              fi
            done
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > notes.md

          {
            echo "body<<__RELEASE_NOTES_EOF__"
            cat notes.md
            echo "__RELEASE_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Preview notes
        shell: bash
        run: cat notes.md

  # Linux artık Tauri ile paketlenmiyor: WebKitGTK'nın kompozitör performansı
  # nedeniyle Linux dağıtımı Electron kabuğuna taşındı (aşağıdaki
  # publish-electron-linux job'ı). Windows/macOS Tauri ile devam ediyor.
  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Arterm ${{ github.ref_name }}"
          # Categorized notes generated from Conventional Commits by the
          # changelog job above; published immediately (no draft).
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Linux dağıtımı: Electron kabuğu + arterm-bridge (Rust sidecar).
  # scripts/package-linux.sh AppImage + deb üretir; release'e gh ile yüklenir.
  publish-electron-linux:
    needs: changelog
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      # arterm-bridge, arterm lib'i üzerinden tauri crate'ine bağlı; Linux'ta
      # tauri'nin sys crate'leri webkit/gtk dev paketlerini ister (binary
      # bunları kullanmaz ama derleme için gerekli).
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: electron-linux

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build arterm-bridge
        working-directory: src-tauri
        run: cargo build --release --bin arterm-bridge

      - name: Package AppImage + deb
        run: bash scripts/package-linux.sh

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ needs.changelog.outputs.body }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # tauri-action (windows) release'i henüz oluşturmadıysa biz oluşturalım.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Arterm $TAG" --notes "$RELEASE_BODY"
          fi
          # linux-checksums.json'u uygulama içi güncelleyici okur: asset
          # adlarını ve sha256'larını oradan alır (bkz. electron/updater.cjs).
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            release-electron/*.AppImage \
            release-electron/*.deb \
            release-electron/linux-checksums.json
